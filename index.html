      <div class="field">
        <label>Rate Your Landlord (optional)</label>
        <p style="font-size:12px;color:var(--muted);margin-bottom:8px">How'd they do in these areas?</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label style="font-size:12px">Maintenance</label><select id="rev-score-maintenance"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Terrible)':n===3?' (Average)':n===5?' (Excellent)':''}</option>`).join("")}</select></div>
          <div><label style="font-size:12px">Communication</label><select id="rev-score-communication"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Ghost)':n===3?' (Average)':n===5?' (Very Responsive)':''}</option>`).join("")}</select></div>
          <div><label style="font-size:12px">Fairness</label><select id="rev-score-fairness"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Scammy)':n===3?' (Average)':n===5?' (Very Fair)':''}</option>`).join("")}</select></div>
          <div><label style="font-size:12px">Move-Out</label><select id="rev-score-moveout"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Nightmare)':n===3?' (Average)':n===5?' (Smooth)':''}</option>`).join("")}</select></div>
        </div>
      </div>

      <div class="field">
        <label>Property Address</label>
        <input type="text" id="rev-property-custom" placeholder="e.g. 309 E Green St, Apt 4B" oninput="onAddressInput(this)" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;" />
        <div id="addr-match-hint" style="display:none;margin-top:6px;padding:8px 12px;border-radius:8px;font-size:12px"></div>
        <p style="font-size:11px;color:var(--muted);margin-top:4px">Street address where you lived. This helps other students find reviews for their building.</p>
      </div>
      <div class="field">
        <label>Neighborhood</label>
        <select id="rev-hood-select">
          <option value="">Select neighborhood...</option>
          <option value="Campustown">Campustown — Green St to University Ave, Wright to 1st St</option>
          <option value="Lincoln Ave">Lincoln Ave — Along Lincoln Ave, north of Green St</option>
          <option value="South Campus">South Campus — South of University Ave (PAR, FAR, Ike area)</option>
          <option value="East Campus">East Campus — East of Wright St (ISR, Hendrick House area)</option>
          <option value="North Champaign">North Champaign — North of University Ave, west of Neil St</option>
          <option value="Urbana">Urbana — East of Lincoln Ave / Race St into Urbana</option>
          <option value="__other__">Other / Not sure</option>
        </select>
      </div>

      <div class="field">
        <label>Lease Period</label>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="rev-lease-start" style="flex:1">
            <option value="">Start...</option>
            ${["Fall 2020","Spring 2021","Summer 2021","Fall 2021","Spring 2022","Summer 2022","Fall 2022","Spring 2023","Summer 2023","Fall 2023","Spring 2024","Summer 2024","Fall 2024","Spring 2025","Summer 2025","Fall 2025","Spring 2026","Summer 2026","Fall 2026"].map(t=>`<option value="${t}">${t}</option>`).join("")}
          </select>
          <span style="color:var(--muted)">to</span>
          <select id="rev-lease-end" style="flex:1">
            <option value="">End...</option>
            ${["Spring 2021","Summer 2021","Fall 2021","Spring 2022","Summer 2022","Fall 2022","Spring 2023","Summer 2023","Fall 2023","Spring 2024","Summer 2024","Fall 2024","Spring 2025","Summer 2025","Fall 2025","Spring 2026","Summer 2026","Fall 2026","Spring 2027"].map(t=>`<option value="${t}">${t}</option>`).join("")}
          </select>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:4px">Helps verify reviews and lets you review the same landlord for different lease periods.</p>
      </div>

      <div class="field">
        <label>Monthly Rent (per person)</label>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:18px;font-weight:700">$</span>
          <input type="number" id="rev-rent" placeholder="e.g. 750" min="200" max="4000" style="flex:1" />
          <span style="font-size:13px;color:var(--muted)">/month</span>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:4px">What you actually pay per month. Helps other students compare real costs.</p>
      </div>

      <div class="field">
        <label>Rate the Neighborhood (optional)</label>
        <p style="font-size:12px;color:var(--muted);margin-bottom:8px">Help future students know what the area is like.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label style="font-size:12px">Safety</label><select id="rev-hood-safety"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Unsafe)':n===3?' (Average)':n===5?' (Very Safe)':''}</option>`).join("")}</select></div>
          <div><label style="font-size:12px">Walkability</label><select id="rev-hood-walk"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Need Car)':n===3?' (Decent)':n===5?' (Walk Everywhere)':''}</option>`).join("")}</select></div>
          <div><label style="font-size:12px">Noise Level</label><select id="rev-hood-quiet"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Very Loud)':n===3?' (Average)':n===5?' (Very Quiet)':''}</option>`).join("")}</select></div>
          <div><label style="font-size:12px">Nightlife</label><select id="rev-hood-nightlife"><option value="0">—</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n}/5${n===1?' (Dead)':n===3?' (Some)':n===5?' (Party Central)':''}</option>`).join("")}</select></div>
        </div>
      </div>

      <div class="field">
        <label>Your Experience</label>
        <textarea id="rev-text" placeholder="Be specific: maintenance speed, communication, deposit fairness, overall condition..."></textarea>
      </div>

      <div class="field">
        <label>Tags — select all that apply</label>
        <div class="chip-group" id="pos-tags">
          ${["Great Location","Responsive","Fast Repairs","Modern","Quiet","Pet Friendly","Fair Deposit","Furnished","Good Amenities","Cheap Rent"].map(t=>
            `<span class="chip ${S.posTags.includes(t)?'sel-pos':''}" data-tag="${esc(t)}" data-type="pos" onclick="toggleTag('pos','${esc(t)}')">${esc(t)}</span>`
          ).join("")}
        </div>
        <div class="chip-group" id="neg-tags" style="margin-top:8px">
          ${["Slow Maintenance","Unfair Charges","Pests","Poor Communication","Old Building","Noisy","Hidden Fees","Thin Walls"].map(t=>
            `<span class="chip ${S.negTags.includes(t)?'sel-neg':''}" data-tag="${esc(t)}" data-type="neg" onclick="toggleTag('neg','${esc(t)}')">${esc(t)}</span>`
          ).join("")}
        </div>
      </div>

      <div class="field">
        <label>Verify you're a student (optional, adds trust badge)</label>
        <input type="email" id="rev-email" placeholder="netid@illinois.edu" />
      </div>

      <div class="field" style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:12px 14px">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="rev-certify" style="margin-top:3px;accent-color:#E84A27;min-width:20px;min-height:20px" />
          <span style="font-size:13px;color:#92400E;line-height:1.4">I certify that I am a current or former tenant (not a landlord, property manager, or their employee) and this review reflects my real experience.</span>
        </label>
      </div>

      <button class="submit-btn" onclick="submitReview(${l?l.id:'null'})" ${S.stars===0?'disabled':''}>Submit My Review</button>
      <p class="note">Reviews are anonymous. Email is only used for verification, never displayed.</p>
    </div>
  </div>`;
}

// ===== LEASE SCANNER =====
const LEASE_FLAGS = [
  // HIGH SEVERITY — likely unenforceable or illegal under Illinois law
  {
    id: 'nonrefundable-deposit',
    patterns: [/non[\s-]?refundable\s+(security\s+)?deposit/i, /deposit.*(?:will\s+not|shall\s+not|cannot|won'?t)\s+be\s+returned/i],
    severity: 'high',
    title: 'Potentially Non-Refundable Security Deposit',
    explain: 'Illinois law requires landlords to return security deposits (minus documented deductions for actual damages) within 30 days for properties with 5+ units, or 45 days for smaller properties. A clause making a deposit entirely non-refundable may conflict with this requirement.',
    statute: '765 ILCS 710 — Security Deposit Return Act'
  },
  {
    id: 'waive-rights',
    patterns: [/waive.*(?:right|rights|remedies)/i, /tenant\s+(?:hereby\s+)?waives/i, /waiver\s+of\s+(?:tenant|all|any)\s+rights/i],
    severity: 'high',
    title: 'Waiver of Tenant Rights',
    explain: 'Under Illinois law, lease provisions that attempt to waive tenants\u2019 rights under the Security Deposit Return Act or local housing codes are generally void and unenforceable. You cannot be required to waive your statutory protections.',
    statute: '765 ILCS 710/6 — Provisions waiving tenant rights are void'
  },
  {
    id: 'no-repairs',
    patterns: [/tenant\s+(?:is\s+)?responsible\s+for\s+all\s+(?:repairs|maintenance)/i, /landlord.*(?:not|no)\s+(?:responsible|liable|obligat).*(?:repair|maintain|habitab)/i, /as[\s-]?is\s+condition/i, /accept.*premises.*(?:as[\s-]?is|current\s+condition)/i],
    severity: 'high',
    title: 'Potential Habitability Waiver',
    explain: 'Illinois landlords have an implied warranty of habitability — they must maintain the property in a livable condition regardless of what the lease says. Clauses that try to shift all repair responsibility to tenants or disclaim habitability obligations may be unenforceable.',
    statute: 'Jack Spring, Inc. v. Little (1972) — Implied Warranty of Habitability'
  },
  {
    id: 'lockout',
    patterns: [/lock[\s-]?out/i, /change.*locks.*(?:without|if|upon|for)/i, /deny\s+(?:access|entry).*(?:late|unpaid|overdue)/i, /remove\s+tenant.*property.*(?:unpaid|nonpayment)/i],
    severity: 'high',
    title: 'Potential Self-Help Eviction / Lockout',
    explain: 'Illinois law prohibits landlords from locking out tenants or removing their belongings without a court order, even if rent is unpaid. Only a court-ordered eviction process is legal. Clauses permitting lockouts are unenforceable.',
    statute: '735 ILCS 5/9-101 et seq. — Forcible Entry and Detainer Act'
  },
  {
    id: 'liability-waiver',
    patterns: [/tenant.*(?:waives?|releases?|holds?\s+harmless).*(?:landlord|owner|management).*(?:injury|damage|loss|negligence)/i, /(?:landlord|owner|management).*not\s+(?:liable|responsible).*(?:injury|personal|damage|theft|loss)/i],
    severity: 'high',
    title: 'Broad Liability Waiver',
    explain: 'Clauses that attempt to completely waive a landlord\u2019s liability for their own negligence (e.g., injuries caused by failure to maintain the property) may be unenforceable under Illinois law. Landlords generally cannot disclaim liability for negligence.',
    statute: 'Illinois common law — Public policy against negligence waivers in residential leases'
  },
  // MEDIUM SEVERITY — worth reviewing, potentially problematic
  {
    id: 'late-fee-excessive',
    patterns: [/late\s+fee.*\$\s*(?:[1-9]\d{2,}|[5-9]\d)/i, /(?:\$\s*(?:[1-9]\d{2,}|[5-9]\d)).*late\s+(?:fee|charge|penalty)/i, /late\s+(?:fee|charge|penalty).*(?:per\s+day|daily|compounding|10%|15%|20%)/i],
    severity: 'medium',
    title: 'Potentially Excessive Late Fee',
    explain: 'While Illinois doesn\u2019t set a specific dollar cap on late fees, Champaign city code and courts generally require that late fees be "reasonable" and proportional to actual damages from late payment. Fees that exceed 5% of monthly rent or include daily compounding penalties may be challenged as excessive.',
    statute: 'Champaign Municipal Code Ch. 12.5 — Landlord-Tenant Relationships'
  },
  {
    id: 'entry-no-notice',
    patterns: [/(?:landlord|owner|management|agent).*(?:may|shall|can|right\s+to)\s+enter.*(?:at\s+any\s+time|without\s+(?:notice|consent|permission))/i, /entry\s+without\s+(?:prior\s+)?notice/i, /unrestricted\s+(?:access|entry)/i],
    severity: 'medium',
    title: 'Entry Without Notice',
    explain: 'While Illinois state law doesn\u2019t specify a notice period for landlord entry, Champaign\u2019s local ordinance and standard practice require reasonable notice (typically 24 hours) before entering a tenant\u2019s unit, except in genuine emergencies. Clauses granting unrestricted entry may conflict with your privacy rights.',
    statute: 'Champaign Municipal Code Ch. 12.5; General tenant privacy rights'
  },
  {
    id: 'auto-renewal',
    patterns: [/auto(?:matic(?:ally)?)?[\s-]?renew/i, /lease\s+(?:shall|will)\s+(?:automatically\s+)?(?:renew|extend|continue)/i, /(?:renew|extend).*(?:unless.*(?:written|notice).*(?:\d+)\s+days)/i],
    severity: 'medium',
    title: 'Automatic Lease Renewal',
    explain: 'Some leases automatically renew for another full term unless you give written notice 60-90+ days in advance. This isn\u2019t illegal, but it\u2019s a common trap — many students forget the deadline and get locked into another year. Check the exact notice deadline and mark your calendar.',
    statute: 'Review notice period carefully — this is a common source of disputes'
  },
  {
    id: 'joint-several',
    patterns: [/joint\s+and\s+several\s+liability/i, /each\s+tenant.*(?:liable|responsible).*(?:full|entire|total)\s+(?:amount|rent|balance)/i, /roommate.*(?:liable|responsible).*(?:share|portion|rent)/i],
    severity: 'medium',
    title: 'Joint and Several Liability',
    explain: 'This means if your roommate doesn\u2019t pay rent, YOU are responsible for the full amount. This is legal and very common in student leases, but you should understand the risk. If one roommate moves out or stops paying, the landlord can come after you for the entire rent — not just your share.',
    statute: 'Legal but important — consider a separate roommate agreement'
  },
  {
    id: 'sublease-ban',
    patterns: [/(?:no|prohibit|not\s+permit|shall\s+not|may\s+not)\s+(?:sublease|sublet|assign)/i, /subleas(?:e|ing).*(?:prohibited|not\s+(?:allowed|permitted))/i],
    severity: 'medium',
    title: 'Sublease Restrictions',
    explain: 'Many student leases prohibit or restrict subleasing. This means if you need to leave early (study abroad, internship, emergency), you may be stuck paying rent for an empty apartment. Check whether subletting is completely banned or allowed with landlord approval.',
    statute: 'Legal but check flexibility — this matters for summer and study abroad'
  },
  {
    id: 'early-termination-fee',
    patterns: [/early\s+termination\s+fee/i, /(?:break|cancel|terminat).*lease.*(?:\$|fee|penalty|remaining\s+rent|liquidated\s+damages)/i, /(?:responsible|liable).*(?:remaining|rest\s+of|balance\s+of)\s+(?:the\s+)?(?:lease|rent|term)/i],
    severity: 'medium',
    title: 'Early Termination Penalty',
    explain: 'If you break the lease early, this clause determines what you owe. Being liable for "all remaining rent" on a 12-month lease could mean thousands of dollars. Check whether there\u2019s a reasonable buyout option (e.g., 2 months\u2019 rent) or whether the landlord is required to mitigate damages by finding a new tenant.',
    statute: 'Illinois law requires landlord mitigation — they must try to re-rent the unit'
  },
  // LOW SEVERITY — informational, standard but worth knowing
  {
    id: 'pet-policy',
    patterns: [/(?:no|not?\s+)(?:pets?|animals?)\s+(?:allowed|permitted)/i, /pet\s+(?:deposit|fee|rent).*\$\s*\d+/i, /(?:\$\s*\d+).*pet\s+(?:deposit|fee|rent)/i],
    severity: 'low',
    title: 'Pet Policy',
    explain: 'Note the specific terms around pets — is there a one-time pet deposit, monthly pet rent, weight/breed restrictions, or a total ban? Pet deposits are separate from security deposits under Illinois law. Also note: emotional support animals (ESAs) are generally exempt from pet policies under fair housing law if you have documentation.',
    statute: 'Fair Housing Act — ESA accommodations; 765 ILCS 710 — pet deposits are separate'
  },
  {
    id: 'move-out-charges',
    patterns: [/(?:cleaning|move[\s-]?out|carpet|painting)\s+(?:fee|charge).*\$\s*\d+/i, /(?:\$\s*\d+).*(?:cleaning|move[\s-]?out|carpet|painting)\s+(?:fee|charge)/i, /(?:mandatory|required|non[\s-]?refundable)\s+(?:cleaning|move[\s-]?out)\s+fee/i],
    severity: 'low',
    title: 'Move-Out / Cleaning Fees',
    explain: 'Check whether cleaning or move-out fees are mandatory regardless of condition, or only charged if needed. Under Illinois law, landlords can only deduct from your security deposit for actual damages beyond normal wear and tear — not for routine cleaning that would happen between any tenants.',
    statute: '765 ILCS 710 — Deductions limited to actual damages beyond normal wear'
  },
  {
    id: 'utility-responsibility',
    patterns: [/tenant.*(?:responsible|liable|pay).*(?:all|every|any)\s+utilit/i, /utilit.*(?:tenant|resident|lessee).*(?:responsibility|expense|cost)/i],
    severity: 'low',
    title: 'Utility Responsibilities',
    explain: 'Make sure you understand exactly which utilities you\u2019re paying for. Common gotchas: some buildings have shared water meters where costs are split (sometimes unfairly), trash/sewer fees that aren\u2019t mentioned upfront, or "utility packages" that cost more than actual usage.',
    statute: 'Informational — compare against advertised "utilities included" claims'
  },
  {
    id: 'guest-policy',
    patterns: [/guest.*(?:no\s+more\s+than|limit|maximum|exceed|consecutive)\s*\d+\s*(?:day|night|hour)/i, /(?:overnight|extended)\s+guest.*(?:prohibited|not\s+(?:allowed|permitted)|approval|permission)/i],
    severity: 'low',
    title: 'Guest Restrictions',
    explain: 'Some leases limit how many nights a guest can stay (commonly 3-7 consecutive nights or 14 nights per month). While landlords can set reasonable guest policies, overly restrictive rules that effectively prevent you from having visitors may be challengeable.',
    statute: 'Informational — common in student leases, check if restrictions are reasonable'
  },
  // ADDITIONAL HIGH-SEVERITY FLAGS
  {
    id: 'confession-judgment',
    patterns: [/confess(?:ion)?\s+(?:of\s+)?judgment/i, /cognovit/i, /warrant\s+of\s+attorney/i],
    severity: 'high',
    title: 'Confession of Judgment Clause',
    explain: 'A confession of judgment clause lets your landlord get a court judgment against you without notifying you or giving you a chance to defend yourself. These clauses are void and unenforceable in Illinois residential leases under the Code of Civil Procedure.',
    statute: '735 ILCS 5/2-1301 — Confession of judgment provisions'
  },
  {
    id: 'penalty-provision',
    patterns: [/liquidated\s+damages.*(?:\$\s*(?:[2-9]\d{3,}|\d{4,})|(?:two|three|four|five)\s+(?:months?|times?))/i, /penalty.*(?:equal\s+to|amount\s+of).*(?:remaining|total|full)\s+(?:rent|lease)/i],
    severity: 'high',
    title: 'Potentially Punitive Penalty Clause',
    explain: 'Illinois courts distinguish between reasonable liquidated damages and punitive penalties. If a clause requires you to pay an amount wildly disproportionate to actual damages (e.g., the entire remaining lease balance with no duty to re-rent), it may be unenforceable as a penalty.',
    statute: 'Illinois common law — Penalty clauses vs. liquidated damages'
  },
  // ADDITIONAL MEDIUM-SEVERITY FLAGS
  {
    id: 'rent-increase',
    patterns: [/(?:landlord|owner|management).*(?:may|shall|can|right\s+to)\s+(?:increase|raise|adjust).*rent.*(?:at\s+any\s+time|without\s+(?:notice|consent)|during\s+the\s+(?:term|lease))/i],
    severity: 'medium',
    title: 'Mid-Lease Rent Increase',
    explain: 'If your lease allows rent increases during the fixed term (not just at renewal), that could mean unexpected cost increases. In a standard fixed-term lease, your rent should be locked for the entire lease period unless you explicitly agree to a variable rate.',
    statute: 'Review carefully — fixed-term leases generally lock in the rent amount'
  },
  {
    id: 'mold-disclaimer',
    patterns: [/mold.*(?:not\s+(?:responsible|liable)|at\s+(?:own|your)\s+risk|tenant.*(?:responsible|liable).*mold)/i, /(?:landlord|owner).*(?:not|no)\s+(?:responsible|liable|warrant).*mold/i],
    severity: 'medium',
    title: 'Mold Liability Disclaimer',
    explain: 'While Illinois does not have specific mold statutes, landlords still have a duty to maintain habitable premises. A blanket mold disclaimer does not override the implied warranty of habitability — if mold results from a structural or plumbing issue the landlord failed to fix, they may still be liable.',
    statute: 'Implied Warranty of Habitability — landlord duty to maintain premises'
  },
  {
    id: 'mandatory-arbitration',
    patterns: [/(?:mandatory|binding|compulsory)\s+arbitration/i, /(?:waive|waiver).*(?:right\s+to).*(?:jury|trial|court|sue|litigation)/i, /(?:dispute|claim|controversy).*(?:shall|must|will)\s+be\s+(?:resolved|settled|determined)\s+(?:by|through)\s+arbitration/i],
    severity: 'medium',
    title: 'Mandatory Arbitration Clause',
    explain: 'This clause forces you to resolve disputes through private arbitration rather than going to court. Arbitration can limit your ability to present evidence, appeal decisions, or join class actions. While generally enforceable, the fairness of the specific arbitration terms matters — watch for clauses that make you pay all arbitration fees or select the arbitrator.',
    statute: 'Federal Arbitration Act; review fairness of specific terms'
  },
  // ADDITIONAL LOW-SEVERITY FLAGS
  {
    id: 'renters-insurance',
    patterns: [/(?:renter'?s?|tenant'?s?)\s+insurance.*(?:required|mandatory|must|shall)/i, /(?:required|must|shall).*(?:obtain|maintain|carry|purchase).*(?:renter'?s?|tenant'?s?|liability)\s+insurance/i],
    severity: 'low',
    title: 'Renters Insurance Required',
    explain: 'Many landlords require renters insurance — this is legal and actually protects you too. Typical cost is $10-20/month for students. It covers your belongings (theft, fire, water damage) and personal liability. If required, make sure you understand the minimum coverage amounts specified.',
    statute: 'Informational — generally a good idea regardless of lease requirements'
  },
  {
    id: 'parking-fee',
    patterns: [/parking.*(?:fee|charge|additional|extra|separate).*\$\s*\d+/i, /(?:\$\s*\d+).*(?:per|monthly).*parking/i],
    severity: 'low',
    title: 'Separate Parking Fee',
    explain: 'Parking is often charged separately from rent. Make sure the advertised rent price included or excluded parking before you committed, and check whether the parking fee can increase separately from rent during your lease term.',
    statute: 'Informational — compare against what was advertised'
  }
];

function scanLease(text) {
  const results = [];
  const lowerText = text.toLowerCase();

  LEASE_FLAGS.forEach(flag => {
    for (const pattern of flag.patterns) {
      const match = text.match(pattern);
      if (match) {
        // Extract surrounding context (up to 100 chars each side)
        const idx = match.index;
        const start = Math.max(0, idx - 80);
        const end = Math.min(text.length, idx + match[0].length + 80);
        let snippet = text.slice(start, end).trim();
        if (start > 0) snippet = '...' + snippet;
        if (end < text.length) snippet = snippet + '...';

        results.push({
          ...flag,
          matchedText: snippet,
          matchedTerm: match[0]
        });
        break; // Only flag once per rule
      }
    }
  });

  return results;
}

// ===== PDF TEXT EXTRACTION =====
async function extractPdfText(file) {
  if (!window.pdfjsLib) {
    toast('PDF reader is loading. Please try again in a moment.');
    return null;
  }
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  const totalPages = pdf.numPages;
  const progressEl = document.getElementById('scanner-progress');
  const progressFill = document.getElementById('scanner-progress-fill');
  const progressText = document.getElementById('scanner-progress-text');
  if (progressEl) { progressEl.style.display = 'block'; }

  for (let i = 1; i <= totalPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    fullText += pageText + '\n\n';
    if (progressFill) progressFill.style.width = ((i / totalPages) * 100) + '%';
    if (progressText) progressText.textContent = 'Reading page ' + i + ' of ' + totalPages + '...';
  }
  if (progressEl) { setTimeout(() => { progressEl.style.display = 'none'; }, 500); }
  return fullText.trim();
}

async function handlePdfUpload(file) {
  if (!file || file.type !== 'application/pdf') {
    toast('Please upload a PDF file.');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    toast('File too large. Maximum size is 20MB.');
    return;
  }
  pdfExtracting = true;
  const textarea = document.getElementById('lease-text');
  const uploadZone = document.getElementById('upload-zone');
  if (uploadZone) uploadZone.innerHTML = '<div class="upload-icon" style="font-size:14px;color:rgba(255,255,255,0.5)">...</div><div class="upload-text">Extracting text from <strong>' + esc(file.name) + '</strong>...</div>';

  try {
    const text = await extractPdfText(file);
    if (text && text.length > 50) {
      if (textarea) textarea.value = text;
      toast('PDF text extracted (' + text.length.toLocaleString() + ' characters). Ready to scan!');
      trackScannerEvent('pdf_upload', { filename: file.name, chars: text.length });
    } else {
      toast('Could not extract enough text from this PDF. It may be a scanned image. Try pasting the text manually.');
      trackScannerEvent('pdf_upload_fail', { filename: file.name, reason: 'insufficient_text' });
    }
  } catch(err) {
    toast('Error reading PDF: ' + err.message);
    trackScannerEvent('pdf_upload_fail', { filename: file.name, reason: err.message });
  }
  pdfExtracting = false;
  if (uploadZone) uploadZone.innerHTML = '<div class="upload-icon" style="font-size:24px;font-weight:700;color:rgba(255,255,255,0.3)">PDF</div><div class="upload-text"><strong>Click to upload</strong> or drag & drop your lease PDF<br>PDF files up to 20MB</div>';
}

function setupUploadZone() {
  setTimeout(() => {
    const zone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('pdf-file-input');
    if (!zone || !fileInput) return;
    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handlePdfUpload(file);
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handlePdfUpload(file);
    });
  }, 50);
}

function looksLikeLease(text) {
  // Must have minimum length — real leases are long
  if (text.length < 200) return { valid: false, reason: 'Too short — paste at least a few paragraphs from your lease.' };
  // Check for lease-related keywords
  const leaseWords = ['tenant','landlord','lease','rent','security deposit','premises','agreement',
    'occupant','property','termination','notice','maintenance','utilities','move-in','move-out',
    'monthly','payment','term','renewal','violation','eviction','damages','repair','unit','apartment',
    'bedroom','bathroom','parking','pet','sublease','assignee','lessee','lessor','dwelling','occupancy'];
  const lower = text.toLowerCase();
  const matchCount = leaseWords.filter(w => lower.includes(w)).length;
  if (matchCount < 3) return { valid: false, reason: "This doesn't look like a lease. Paste the actual text from your lease agreement and we'll flag anything sketchy." };
  // Check for excessive repetition (spam detection)
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length >= 3) {
    const uniqueLines = new Set(lines);
    if (uniqueLines.size / lines.length < 0.3) return { valid: false, reason: "Looks like repeated text. Paste your actual lease agreement to get a real scan." };
  }
  return { valid: true };
}

function runScan() {
  const text = document.getElementById('lease-text')?.value?.trim();
  if (!text || text.length < 50) {
    toast('Please paste your lease text (at least a few paragraphs).');
    return;

  const check = looksLikeLease(text);
  if (!check.valid) {
    toast(check.reason);
    trackScannerEvent('scan_rejected', { reason: check.reason, text_length: text.length });
    return;
  }
  scannerClicks++;
  scanResults = scanLease(text);
  // Track scan event
  trackScannerEvent('scan_executed', {
    text_length: text.length,
    flags_found: scanResults.length,
    high_flags: scanResults.filter(f => f.severity === 'high').length,
    medium_flags: scanResults.filter(f => f.severity === 'medium').length,
    low_flags: scanResults.filter(f => f.severity === 'low').length,
    scan_number: scannerClicks
  });
  render();
  // Scroll to results
  setTimeout(() => {
    const el = document.getElementById('scan-results');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

  if (!match) { hint.style.display = 'none'; return; }

  const sel = document.getElementById('rev-landlord');

  let currentLid = 0;

  if (sel) {

  } else {
    // Detail page: the landlord ID is embedded in the submit button's onclick

    currentLid = S.detail || 0;
    currentVal = String(currentLid);

  const srcLabel = match.source === 'verified' ? '' : ' (based on other reviews)';

  if (currentLid === match.landlordId) {

function fuzzyMatch(query, target) {
  const q = query.toLowerCase();
  const t = target.toLowerCase();
  if (t.includes(q)) return true;
  // Check individual words
  const words = q.split(/\s+/);
  return words.every(w => t.includes(w));
}

function onCustomLandlordInput(input) {
  const val = input.value.trim();
  const suggestBox = document.getElementById('landlord-suggestions');
  if (!suggestBox) return;
  if (val.length < 2) { suggestBox.style.display = 'none'; return; }

  // Build full list of existing landlords
  const allNames = [
    ...SEED_LANDLORDS.map(x => ({ name: x.name, value: String(x.id), type: 'seed' })),
    ...(userLandlords || []).map(x => ({ name: x.name, value: 'user_' + x.id, type: 'user' }))
  ];

  const matches = allNames.filter(x => fuzzyMatch(val, x.name)).slice(0, 5);

  if (matches.length === 0) { suggestBox.style.display = 'none'; return; }

  suggestBox.innerHTML = '<div style="font-size:11px;color:#9CA3AF;padding:6px 12px">Did you mean one of these?</div>' +
    matches.map(m =>
      `<div onclick="selectSuggestedLandlord('${m.value}','${esc(m.name)}')" style="padding:10px 12px;cursor:pointer;font-size:14px;border-top:1px solid var(--border);transition:background 0.1s" onmouseover="this.style.background='rgba(255,107,53,0.1)'" onmouseout="this.style.background=''">${esc(m.name)}</div>`
    ).join('');
  suggestBox.style.display = 'block';
}

function selectSuggestedLandlord(value, name) {

  if (suggestBox) suggestBox.style.display = 'none';
}

async function submitReview(landlordIdFromDetail) {
  // Handle landlord selection — could be seed, user-submitted, or custom new
  let landlordId = landlordIdFromDetail;
  let landlordName = '';
  let isCustomLandlord = false;

  if (!landlordId) {
    const landlordSelect = document.getElementById('rev-landlord');
    const landlordVal = landlordSelect?.value || '';
    const landlordCustom = document.getElementById('rev-landlord-custom')?.value?.trim() || '';

    if (landlordVal === '__other__') {
      if (!landlordCustom) { toast('Please type your landlord\'s name.'); return; }
      if (landlordCustom.length < 3) { toast('Landlord name is too short. Please enter the full name.'); return; }
      // Check for fuzzy match one more time before creating a new entry
      const allExisting = [
        ...SEED_LANDLORDS.map(x => ({ name: x.name, value: String(x.id) })),
        ...(userLandlords || []).map(x => ({ name: x.name, value: 'user_' + x.id }))
      ];
      const closeMatch = allExisting.find(x => fuzzyMatch(landlordCustom, x.name));
      if (closeMatch && !confirm(`"${closeMatch.name}" is already listed and looks similar. Click OK to use the existing listing, or Cancel to add "${landlordCustom}" as a new landlord.`)) {
        isCustomLandlord = true;
        landlordName = landlordCustom;
        landlordId = -1;
      } else if (closeMatch) {
        // User chose the existing match
        const sel = document.getElementById('rev-landlord');
        if (sel) sel.value = closeMatch.value;
        landlordId = closeMatch.value.startsWith('user_') ? parseInt(closeMatch.value.replace('user_','')) : parseInt(closeMatch.value);
        landlordName = closeMatch.name;
        isCustomLandlord = false;
      } else {
        isCustomLandlord = true;
        landlordName = landlordCustom;
        landlordId = -1; // placeholder
      }
    } else if (landlordVal.startsWith('user_')) {
      const ul = userLandlords.find(x => 'user_' + x.id === landlordVal);
      landlordId = parseInt(landlordVal.replace('user_', ''));
      landlordName = ul ? ul.name : '';
    } else {
      landlordId = parseInt(landlordVal);
      const match = findLandlord(landlordId);
      landlordName = match ? match.name : '';
    }
  } else {
    const match = findLandlord(landlordId);
    landlordName = match ? match.name : '';
  }

  if (!landlordId && !isCustomLandlord) { toast('Please select a landlord.'); return; }
  if (S.stars === 0) { toast('Please select a star rating (1-5 stars).'); return; }
  if (S.wouldRentChoice === null) { toast('Please answer: would you rent from them again?'); return; }
  if (!document.getElementById('rev-certify')?.checked) { toast('Please certify that you are a real tenant, not a landlord or property manager.'); return; }

  const propCustom = document.getElementById('rev-property-custom')?.value?.trim() || '';
  if (!propCustom) { toast('Please type your property address.'); return; }

  // Soft mismatch warning — never blocks, just asks "are you sure?"
  if (!isCustomLandlord && propCustom.length >= 4) {
    const addrMatch = matchAddressToLandlord(propCustom);
    if (addrMatch && addrMatch.landlordId !== landlordId && addrMatch.source === 'verified') {
      const proceed = confirm(
        'Heads up: "' + propCustom + '" is typically managed by ' + addrMatch.landlordName +
        ', but you selected ' + landlordName + '.\n\n' +
        'Click OK to submit anyway, or Cancel to go back and change the landlord.'
      );
      if (!proceed) return;
    }
    // Unverified-address warning — when address doesn't match ANY known property
    if (!addrMatch) {
      const proceed = confirm(
        'We couldn\'t verify "' + propCustom + '" as a known property for any landlord in our database.\n\n' +
        'Please double-check that the address is correct and spelled properly (e.g. "309 E Green St").\n\n' +
        'Click OK to submit anyway, or Cancel to go back and fix it.'
      );
      if (!proceed) return;
    }
  }

  const text = document.getElementById('rev-text')?.value?.trim();
  if (!text || text.length < 20) { toast('Please write at least 20 characters about your experience.'); return; }
  if (text.length > 5000) { toast('Review text is too long (max 5,000 characters).'); return; }

  const rentInput = document.getElementById('rev-rent')?.value;
  const monthlyRentVal = parseInt(rentInput) || 0;
  if (rentInput && monthlyRentVal > 0 && !isValidRent(monthlyRentVal)) { toast('Monthly rent should be between $' + MIN_RENT + ' and $' + MAX_RENT.toLocaleString() + ' per person.'); return; }

  const isCustomProperty = true;
  const property = propCustom || 'Not specified';
  const email = document.getElementById('rev-email')?.value?.trim() || '';
  const leaseStart = document.getElementById('rev-lease-start')?.value || '';
  const leaseEnd = document.getElementById('rev-lease-end')?.value || '';
  const leasePeriod = (leaseStart && leaseEnd) ? leaseStart + ' – ' + leaseEnd : '';

  // Collect rent + neighborhood ratings
  const monthlyRent = monthlyRentVal;
  const hoodSafety = parseInt(document.getElementById('rev-hood-safety')?.value) || 0;
  const hoodWalk = parseInt(document.getElementById('rev-hood-walk')?.value) || 0;
  const hoodQuiet = parseInt(document.getElementById('rev-hood-quiet')?.value) || 0;
  const hoodNightlife = parseInt(document.getElementById('rev-hood-nightlife')?.value) || 0;

  // Neighborhood comes from the dropdown
  const hoodRaw = document.getElementById('rev-hood-select')?.value || '';
  const hoodName = hoodRaw === '__other__' ? '' : hoodRaw;

  // Collect selected tags from state
  const posTags = [...S.posTags];
  const negTags = [...S.negTags];

  // Include lease period in review text if provided
  const fullText = leasePeriod ? `[Lease: ${leasePeriod}] ${text}` : text;

  // Save new landlord to Supabase if custom
  if (isCustomLandlord && landlordName) {
    try {
      const { data } = await db.from('user_landlords').insert({ name: landlordName }).select();
      if (data && data[0]) {
        landlordId = data[0].id;
        userLandlords.push(data[0]);
      }
    } catch(e) { /* continue with review even if landlord save fails */ }
  }

  // Save new property address to Supabase if custom
  if (isCustomProperty && propCustom) {
    try {
      await db.from('user_properties').insert({
        address: propCustom,
        landlord_name: landlordName || (findLandlord(landlordId)||{}).name || '',
        hood_name: hoodName,
        submitted_at: new Date().toISOString()
      });
      userProperties.push({ address: propCustom, landlord_name: landlordName, hood_name: hoodName });
    } catch(e) { /* continue with review even if property save fails */ }
  }

  const review = {
    landlordId: landlordId,
    property: property,
    author: email.endsWith('@illinois.edu') ? 'Verified Illini' : 'Anonymous Student',
    rating: S.stars,
    wouldRent: S.wouldRentChoice === true,
    text: fullText,
    pos: posTags,
    neg: negTags,
    monthlyRent: monthlyRent,
    hoodName: hoodName,
    hoodSafety: hoodSafety,
    hoodWalkability: hoodWalk,
    hoodQuiet: hoodQuiet,
    hoodNightlife: hoodNightlife,
    scoreMaintenance: parseInt(document.getElementById('rev-score-maintenance')?.value) || 0,
    scoreCommunication: parseInt(document.getElementById('rev-score-communication')?.value) || 0,
    scoreFairness: parseInt(document.getElementById('rev-score-fairness')?.value) || 0,
    scoreMoveOut: parseInt(document.getElementById('rev-score-moveout')?.value) || 0,
    landlordName: landlordName || '',
  };

  // Disable button while saving
  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  const success = await saveReviewToDb(review);
  if (success) {
    go({modal:false, stars:0, wouldRentChoice:null});
    showSharePromptEnhanced(landlordName);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Submit My Review'; }
    toast('Something went wrong. Try again.');
  }
}

async function markHelpful(reviewId, btn, currentCount) {
  const helped = loadHelpful();
  if (helped[reviewId]) {
    // Toggle OFF — remove helpful
    removeHelpful(reviewId);
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.innerHTML = `Helpful (${currentCount})`;
    // Decrement in DB
    try {
      const existing = dbReviews.find(r => r.id === reviewId);
      if (existing && existing.helpful > 0) {
        await db.from('reviews').update({ helpful_count: existing.helpful - 1 }).eq('id', reviewId);
      }
    } catch(e) { /* silent */ }
    return;
  }
  saveHelpful(reviewId);
  btn.style.borderColor = '#16A34A';
  btn.style.color = '#16A34A';
  btn.innerHTML = `Helpful (${currentCount + 1})`;
  await incrementHelpful(reviewId);
}

function removeHelpful(id) {
  const h = loadHelpful();
  delete h[id];
  localStorage.setItem('ratemycrib_helpful', JSON.stringify(h));
}

function loadReported() {
  try { return JSON.parse(localStorage.getItem('ratemycrib_reported') || '{}'); } catch { return {}; }
}
function toggleReport(reviewId, btn) {
  const reported = loadReported();
  if (reported[reviewId]) {
    delete reported[reviewId];
    localStorage.setItem('ratemycrib_reported', JSON.stringify(reported));
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.innerHTML = 'Report';
    toast('Report removed.');
  } else {
    reported[reviewId] = true;
    localStorage.setItem('ratemycrib_reported', JSON.stringify(reported));
    btn.style.borderColor = '#DC2626';
    btn.style.color = '#DC2626';
    btn.innerHTML = 'Reported';
    toast('Review reported. We\'ll look into it.');
  }
}

function copyShareLink() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('Link copied! Share it with your friends.'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Link copied! Share it with your friends.');
  }
}

function RightsPage() {

// ===== MAIN RENDER =====
var _lastSort = null;
var _lastFilter = null;
var _lastHoodFilter = null;

function render() {
  // Track whether this is a real page navigation (vs sort/filter/dark mode toggle)
  var pageChanged = (S.page !== S._prevPage) || (S.detail !== S._prevDetail);
  S._prevPage = S.page;
  S._prevDetail = S.detail;

  // Fast path: if we're on the home page and only sort/filter changed, just swap the results container
  var onHomePage = S.page === 'home' && !S.detail && !S.modal;
  var onlyResultsChanged = onHomePage && !pageChanged &&
    (S.sort !== _lastSort || S.filter !== _lastFilter || S.hoodFilter !== _lastHoodFilter);
  var resultsEl = onlyResultsChanged ? document.getElementById('results-container') : null;

  if (resultsEl && onlyResultsChanged) {
    // Partial update — only re-render the results list, leave hero/nav/ticker untouched
    var temp = document.createElement('div');
    temp.innerHTML = ResultsList();
    resultsEl.replaceWith(temp.firstElementChild);
    _lastSort = S.sort;
    _lastFilter = S.filter;
    _lastHoodFilter = S.hoodFilter;
    // Update filter tag active states in Hero (they live outside #results-container)
    var searchTags = document.querySelectorAll('.search-tags .search-tag');
    searchTags.forEach(function(tag) {
      var txt = tag.textContent.trim();
      var val = txt === 'Top Rated' ? 'top' : txt === 'Lowest Rated' ? 'avoid' : 'all';
      if (val === S.filter) tag.classList.add('active');
      else tag.classList.remove('active');
    });
    // Re-apply search
    if (S.search) {
      var searchEl = document.getElementById('landlord-search');
      if (searchEl) { searchEl.value = S.search; filterLandlordCards(S.search); }
    }
    return;
  }

  // Full render
  let html = Nav() + LandlordTicker();
  if (S.page === 'home' && !S.detail) html += ShareBanner() + Hero() + ResultsList();
  else if (S.page === 'insights') html += InsightsPage();
  else if (S.page === 'detail' || S.detail) html += DetailPage();
  else if (S.page === 'hoods') html += Hoods();
  else if (S.page === 'compare') html += Compare();
  else if (S.page === 'h2h') html += HeadToHeadPage();
  else if (S.page === 'scanner') html += LeaseScanner();
  else if (S.page === 'tos') html += TosPage();
  else if (S.page === 'privacy') html += PrivacyPage();
  else if (S.page === 'rights') html += RightsPage();
  else if (S.page === 'landlords-info') html += LandlordsInfoPage();
  html += Modal() + Footer();
  document.getElementById('app').innerHTML = html;
  _lastSort = S.sort;
  _lastFilter = S.filter;
  _lastHoodFilter = S.hoodFilter;
  // Only scroll to top on actual page/detail navigation, not on sort/filter/dark mode changes
  if (pageChanged && !S.modal) window.scrollTo(0, 0);
  // Re-apply search filter after re-render (preserves search state across sort/dark mode changes)
  if (S.search && S.page === 'home' && !S.detail) {
    var searchEl = document.getElementById('landlord-search');
    if (searchEl) { searchEl.value = S.search; filterLandlordCards(S.search); }
  }
  // Animate hero count-up numbers
  animateHeroCounts();
}

function animateHeroCounts() {
  var els = document.querySelectorAll('.hero-countup');
  if (!els.length) return;
  els.forEach(function(el) {
    var target = parseInt(el.getAttribute('data-target')) || 0;
    if (target === 0) return;
    var duration = 1200; // ms
    var start = null;
    var startVal = 0;
    function step(ts) {
      if (!start) start = ts;
      var progress = Math.min((ts - start) / duration, 1);
      // Ease-out cubic for a satisfying deceleration
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = Math.round(startVal + (target - startVal) * eased);
      el.textContent = current;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

// Handle browser back/forward
window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (hash.startsWith('landlord-')) {
    const id = parseInt(hash.split('-')[1]);
    if (id) go({page:'detail', detail:id});
  } else if (hash === 'neighborhoods') go({page:'hoods', detail:null});
  else if (hash === 'compare') go({page:'compare', detail:null});
  else if (hash === 'head-to-head' || hash === 'h2h') go({page:'h2h', detail:null});
  else if (hash === 'scanner') go({page:'scanner', detail:null});
  else if (hash === 'insights') go({page:'insights', detail:null});
  else go({page:'home', detail:null});
});

// Update hash on navigation
const _origGo = go;

render();
loadUserSubmissions(); // Load user-submitted landlords & properties from Supabase

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}
