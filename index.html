// ===== PERSISTENCE (Supabase + local cache) =====
let dbReviews = []; // reviews loaded from Supabase
let dbLoaded = false;

async function loadDbReviews() {
  try {
    const { data, error } = await db.from('reviews').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    dbReviews = (data || []).map(r => ({
      id: r.id,
      landlordId: r.landlord_id,
      property: r.property || 'Not specified',
      author: r.author || 'Anonymous Student',
      date: new Date(r.created_at).toLocaleDateString('en-US', {month:'short', year:'numeric'}),
      rating: parseFloat(r.rating),
      wouldRent: r.would_rent,
      text: r.review_text,
      pos: r.positive_tags || [],
      neg: r.negative_tags || [],
      helpful: r.helpful_count || 0
    }));
    dbLoaded = true;
    render();
  } catch (e) {
    console.warn('Supabase load failed, using seed data only:', e.message);
    dbLoaded = true;
    render();
  }
}

async function saveReviewToDb(review) {
  try {
    const { error } = await db.from('reviews').insert({
      landlord_id: review.landlordId,
      property: review.property,
      author: review.author,
      rating: review.rating,
      would_rent: review.wouldRent,
      review_text: review.text,
      positive_tags: review.pos,
      negative_tags: review.neg,
      helpful_count: 0
    });
    if (error) throw error;
    await loadDbReviews(); // reload to get the new review with server-assigned id
    return true;
  } catch (e) {
    console.error('Save failed:', e.message);
    return false;
  }
}

async function incrementHelpful(reviewId) {
  // Only works for Supabase reviews (UUID ids), not seed reviews
  if (typeof reviewId === 'string' && reviewId.length > 10) {
    try {
      const existing = dbReviews.find(r => r.id === reviewId);
      if (!existing) return;
      await db.from('reviews').update({ helpful_count: existing.helpful + 1 }).eq('id', reviewId);
    } catch (e) { console.warn('Helpful update failed:', e.message); }
  }
}

function loadHelpful() {
  try { return JSON.parse(localStorage.getItem('ratemycrib_helpful') || '{}'); } catch { return {}; }
}
function saveHelpful(id) {
  const h = loadHelpful();
  h[id] = true;
  localStorage.setItem('ratemycrib_helpful', JSON.stringify(h));
}

// Merge seed + Supabase reviews
function allReviews() {
  return [...SEED_REVIEWS, ...dbReviews];
}

// Load reviews from Supabase on page load
loadDbReviews();

              <td class="${valClass(p.rating,3.5,2.5)}">${p.rating.toFixed(1)}</td>
              <td class="${valClass(parseFloat(val),4,3)}">${val}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
    <p style="font-size:12px;color:#7C7C7C;margin-top:8px">*Value = Rating per $1,000/mo. Higher is better.</p>
  </div>`;
}

function Modal() {
  if (!S.modal) return '';
  const l = S.detail ? SEED_LANDLORDS.find(x=>x.id===S.detail) : null;
  return `<div class="modal-bg" onclick="if(event.target===this)go({modal:false})">
    <div class="modal-box">
      <h2>Rate ${l ? esc(l.name) : 'a Landlord'}</h2>
      <p class="modal-sub">Your review is anonymous and helps other students make better decisions.</p>

      ${!l ? `<div class="field">
        <label>Landlord</label>
        <select id="rev-landlord"><option value="">Select landlord...</option>${SEED_LANDLORDS.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join("")}</select>
      </div>` : ''}

      <div class="field">
        <label>Overall Rating</label>
        <div class="star-row">
          ${[1,2,3,4,5].map(n=>`<span class="${n<=S.stars?'on':''}" onclick="go({stars:${n}})">&#9733;</span>`).join("")}
        </div>
      </div>

      <div class="field">
        <label>Would you rent from them again?</label>
        <div style="display:flex;gap:8px">
          <span class="chip ${S.wouldRentChoice===true?'sel-pos':''}" onclick="go({wouldRentChoice:true})">Yes</span>
          <span class="chip ${S.wouldRentChoice===false?'sel-neg':''}" onclick="go({wouldRentChoice:false})">No</span>
        </div>
      </div>

      <div class="field">
        <label>Property (optional)</label>
        <input type="text" id="rev-property" placeholder="e.g. 309 E Green St" />
      </div>

      <div class="field">
        <label>Your Experience</label>
        <textarea id="rev-text" placeholder="Be specific: maintenance speed, communication, deposit fairness, overall condition..."></textarea>
      </div>

      <div class="field">
        <label>Tags — select all that apply</label>
        <div class="chip-group" id="pos-tags">
          ${["Great Location","Responsive","Fast Repairs","Modern","Quiet","Pet Friendly","Fair Deposit","Furnished","Good Amenities","Cheap Rent"].map(t=>
            `<span class="chip" data-tag="${esc(t)}" data-type="pos" onclick="this.classList.toggle('sel-pos')">${esc(t)}</span>`
          ).join("")}
        </div>
        <div class="chip-group" id="neg-tags" style="margin-top:8px">
          ${["Slow Maintenance","Unfair Charges","Pests","Poor Communication","Old Building","Noisy","Hidden Fees","Thin Walls"].map(t=>
            `<span class="chip" data-tag="${esc(t)}" data-type="neg" onclick="this.classList.toggle('sel-neg')">${esc(t)}</span>`
          ).join("")}
        </div>
      </div>

      <div class="field">
        <label>Verify you're a student (optional, adds trust badge)</label>
        <input type="email" id="rev-email" placeholder="netid@illinois.edu" />
      </div>

      <button class="submit-btn" onclick="submitReview(${l?l.id:'null'})" ${S.stars===0?'disabled':''}>Submit My Review</button>
      <p class="note">Reviews are anonymous. Email is only used for verification, never displayed.</p>
    </div>
  </div>`;
}

  return `<footer>
    <div class="footer-inner">

// ===== ACTIONS =====
async function submitReview(landlordIdFromDetail) {
  const landlordId = landlordIdFromDetail || parseInt(document.getElementById('rev-landlord')?.value);
  if (!landlordId) { toast('Please select a landlord.'); return; }
  if (S.stars === 0) { toast('Please select a star rating.'); return; }

  const text = document.getElementById('rev-text')?.value?.trim();
  if (!text || text.length < 20) { toast('Please write at least 20 characters about your experience.'); return; }

  const property = document.getElementById('rev-property')?.value?.trim() || 'Not specified';
  const email = document.getElementById('rev-email')?.value?.trim() || '';

  // Collect selected tags
  const posTags = [...document.querySelectorAll('#pos-tags .sel-pos')].map(el => el.dataset.tag);
  const negTags = [...document.querySelectorAll('#neg-tags .sel-neg')].map(el => el.dataset.tag);

  const review = {
    landlordId: landlordId,
    property: property,
    author: email.endsWith('@illinois.edu') ? 'Verified Illini' : 'Anonymous Student',
    rating: S.stars,
    wouldRent: S.wouldRentChoice === true,
    text: text,
    pos: posTags,
    neg: negTags,
  };

  // Disable button while saving
  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  const success = await saveReviewToDb(review);
  if (success) {
    go({modal:false, stars:0, wouldRentChoice:null});
    toast('Review submitted! Everyone can see it now.');
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Submit My Review'; }
    toast('Something went wrong. Try again.');
  }
}

async function markHelpful(reviewId, btn, currentCount) {
  const helped = loadHelpful();
  if (helped[reviewId]) return;
  saveHelpful(reviewId);
  btn.style.borderColor = '#16A34A';
  btn.style.color = '#16A34A';
  btn.innerHTML = `&#128077; Helpful (${currentCount + 1})`;
  await incrementHelpful(reviewId);
}

function copyShareLink() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('Link copied! Share it with your friends.'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Link copied! Share it with your friends.');
  }
}

// ===== MAIN RENDER =====
function render() {
  let html = Nav();
  if (S.page === 'home' && !S.detail) html += ShareBanner() + Hero() + ResultsList();
  else if (S.page === 'detail' || S.detail) html += DetailPage();
  else if (S.page === 'hoods') html += Hoods();
  else if (S.page === 'compare') html += Compare();
  html += Modal() + Footer();
  document.getElementById('app').innerHTML = html;
  if (!S.detail && !S.modal) window.scrollTo(0, 0);
}

// Handle browser back/forward
window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (hash.startsWith('landlord-')) {
    const id = parseInt(hash.split('-')[1]);
    if (id) go({page:'detail', detail:id});
  } else if (hash === 'neighborhoods') go({page:'hoods', detail:null});
  else if (hash === 'compare') go({page:'compare', detail:null});
  else go({page:'home', detail:null});
});

// Update hash on navigation
const _origGo = go;

render();
</script>
