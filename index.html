const SEED_REVIEWS = [];

// Neighborhood data — scores are computed live from user reviews
const HOOD_NAMES = ["Campustown","Lincoln Ave","South Campus","East Campus","North Champaign","Urbana"];
const HOOD_TYPES = { "Campustown":"Most Popular", "Lincoln Ave":"Residential", "South Campus":"Budget-Friendly",
  "East Campus":"Engineering Hub", "North Champaign":"Off the Beaten Path", "Urbana":"Alternative Vibe" };

function getHoodStats() {
  return HOOD_NAMES.map(name => {
    // Compute avg rent from seed properties in this hood
    const hoodProps = SEED_PROPERTIES.filter(p => p.hood === name);
    // Compute scores from Supabase reviews that have hood ratings
    const hoodReviews = dbReviews.filter(r => {
      const prop = SEED_PROPERTIES.find(p => p.name === r.property);
      if (prop && prop.hood === name) return true;
      return r.hoodName === name;
    });

    const avg = (arr, key) => {
      const vals = arr.map(r => r[key]).filter(v => v && v > 0);
      return vals.length ? (vals.reduce((s,v)=>s+v,0)/vals.length) : 0;
    };

    // Avg rent comes ONLY from real reviews — no hardcoded prices
    const reviewRents = hoodReviews.map(r => r.monthlyRent).filter(v => v && v > 0);
    const avgRent = reviewRents.length ? Math.round(reviewRents.reduce((s,v)=>s+v,0)/reviewRents.length) : 0;

    return {
      name: name,
      type: HOOD_TYPES[name],
      rent: avgRent,
      safety: parseFloat(avg(hoodReviews, 'hoodSafety').toFixed(1)),
      nightlife: parseFloat(avg(hoodReviews, 'hoodNightlife').toFixed(1)),
      quiet: parseFloat(avg(hoodReviews, 'hoodQuiet').toFixed(1)),
      walk: parseFloat(avg(hoodReviews, 'hoodWalkability').toFixed(1)),
      reviewCount: hoodReviews.length
    };
  });
}

let dbReviews = []; // reviews loaded from Supabase
let dbLoaded = false;

async function loadDbReviews() {
  try {
    const { data, error } = await db.from('reviews').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    dbReviews = (data || []).map(r => ({
      id: r.id,
      landlordId: r.landlord_id,
      property: r.property || 'Not specified',
      author: r.author || 'Anonymous Student',
      date: new Date(r.created_at).toLocaleDateString('en-US', {month:'short', year:'numeric'}),
      rating: parseFloat(r.rating),
      wouldRent: r.would_rent,
      text: r.review_text,
      pos: r.positive_tags || [],
      neg: r.negative_tags || [],
      helpful: r.helpful_count || 0,
      monthlyRent: r.monthly_rent || 0,
      hoodName: r.hood_name || '',
      hoodSafety: r.hood_safety || 0,
      hoodWalkability: r.hood_walkability || 0,
      hoodQuiet: r.hood_quiet || 0,
      hoodNightlife: r.hood_nightlife || 0,
    }));
    dbLoaded = true;
    render();
  } catch (e) {
    console.warn('Supabase load failed, using seed data only:', e.message);
    dbLoaded = true;
    render();
  }
}

// Generate a simple device fingerprint for rate-limiting (not tracking)
function getDeviceFingerprint() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.textBaseline = 'top';
  ctx.font = '14px Arial';
  ctx.fillText('RateMyCrib', 2, 2);
  const raw = canvas.toDataURL() + navigator.language + screen.width + screen.height + new Date().getTimezoneOffset();
  let hash = 0;
  for (let i = 0; i < raw.length; i++) { hash = ((hash << 5) - hash) + raw.charCodeAt(i); hash |= 0; }
  return 'fp_' + Math.abs(hash).toString(36);
}

// Check if this device already reviewed this landlord
function hasReviewedLandlord(landlordId) {
  const key = 'rmc_reviewed';
  try {
    const reviewed = JSON.parse(localStorage.getItem(key) || '{}');
    return !!reviewed[landlordId];
  } catch { return false; }
}
function markReviewedLandlord(landlordId) {
  const key = 'rmc_reviewed';
  try {
    const reviewed = JSON.parse(localStorage.getItem(key) || '{}');
    reviewed[landlordId] = Date.now();
    localStorage.setItem(key, JSON.stringify(reviewed));
  } catch { /* ignore */ }
}

async function saveReviewToDb(review) {
  // Rate limiting: one review per landlord per device
  if (hasReviewedLandlord(review.landlordId)) {
    toast('You have already reviewed this landlord. One review per landlord keeps things fair.');
    return false;
  }

  try {
    const fp = getDeviceFingerprint();
    const row = {
      landlord_id: review.landlordId,
      property: review.property,
      author: review.author,
      rating: review.rating,
      would_rent: review.wouldRent,
      review_text: review.text,
      positive_tags: review.pos,
      negative_tags: review.neg,
      helpful_count: 0,
      device_fingerprint: fp,
    };
    // Add new fields only if they have values (columns may not exist yet)
    if (review.monthlyRent > 0) row.monthly_rent = review.monthlyRent;
    if (review.hoodName) row.hood_name = review.hoodName;
    if (review.hoodSafety > 0) row.hood_safety = review.hoodSafety;
    if (review.hoodWalkability > 0) row.hood_walkability = review.hoodWalkability;
    if (review.hoodQuiet > 0) row.hood_quiet = review.hoodQuiet;
    if (review.hoodNightlife > 0) row.hood_nightlife = review.hoodNightlife;
    const { error } = await db.from('reviews').insert(row);
    if (error) throw error;
    markReviewedLandlord(review.landlordId);
    await loadDbReviews(); // reload to get the new review with server-assigned id
    return true;
  } catch (e) {
    console.error('Save failed:', e.message);
    return false;
  }
}

async function incrementHelpful(reviewId) {
  // Only works for Supabase reviews (UUID ids), not seed reviews
  if (typeof reviewId === 'string' && reviewId.length > 10) {
    try {
      const existing = dbReviews.find(r => r.id === reviewId);
      if (!existing) return;
      await db.from('reviews').update({ helpful_count: existing.helpful + 1 }).eq('id', reviewId);
    } catch (e) { console.warn('Helpful update failed:', e.message); }
  }
}

function loadHelpful() {

}
function saveHelpful(id) {
  const h = loadHelpful();
  h[id] = true;
  localStorage.setItem('ratemycrib_helpful', JSON.stringify(h));
}

// Dynamically compute landlord stats from real Supabase reviews
function getLandlordStats(landlord) {
  const revs = allReviews().filter(r => r.landlordId === landlord.id);
  if (revs.length === 0) {
    return { ...landlord, rating: 0, reviews: 0, wouldRent: 0, responseRate: "—",
      scores:{maintenance:0,communication:0,fairness:0,moveOut:0}, dist:[0,0,0,0,0] };
  }
  const avg = revs.reduce((s,r) => s + r.rating, 0) / revs.length;
  const wouldRentPct = Math.round(revs.filter(r => r.wouldRent).length / revs.length * 100);
  const dist = [0,0,0,0,0];
  revs.forEach(r => {
    const star = Math.round(r.rating);
    if (star >= 1 && star <= 5) dist[5 - star]++;
  });
  return { ...landlord, rating: avg, reviews: revs.length, wouldRent: wouldRentPct,
    scores:{maintenance:0,communication:0,fairness:0,moveOut:0}, dist: dist };
}

    ${revs.length===0?'<p style="text-align:center;color:#7C7C7C;padding:48px">No reviews yet. Be the first!</p>':''}

        </div>
        <div style="text-align:right">
          ${(() => { const propRevs = allReviews().filter(r => r.property === p.name && r.monthlyRent > 0); const propAvg = propRevs.length ? Math.round(propRevs.reduce((s,r)=>s+r.monthlyRent,0)/propRevs.length) : 0; return propAvg ? `<div style="font-weight:700;font-size:18px">$${propAvg}<span style="font-size:12px;color:#7C7C7C;font-weight:400">/mo</span></div><div style="font-size:10px;color:#9CA3AF">from ${propRevs.length} review${propRevs.length!==1?'s':''}</div>` : `<div style="font-size:13px;color:#9CA3AF">No price data yet</div>`; })()}

function Compare() {
  // Enrich properties with review-based pricing
  const revs = allReviews();
  let filtered = SEED_PROPERTIES.map(p => {
    const propRevs = revs.filter(r => r.landlordId === p.landlordId && r.monthlyRent > 0);
    const reviewPrice = propRevs.length ? Math.round(propRevs.reduce((s,r)=>s+r.monthlyRent,0)/propRevs.length) : 0;
    return { ...p, reviewPrice, reviewCount: propRevs.length };
  });

  // Apply filters from state
  if (S.cmpBeds !== undefined && S.cmpBeds !== 'all') {
    filtered = filtered.filter(p => S.cmpBeds === '0' ? p.beds === 0 : p.beds === parseInt(S.cmpBeds));
  }
  if (S.cmpHood && S.cmpHood !== 'all') {
    filtered = filtered.filter(p => p.hood === S.cmpHood);
  }
  if (S.cmpMaxRent && S.cmpMaxRent > 0) {
    filtered = filtered.filter(p => p.reviewPrice > 0 && p.reviewPrice <= S.cmpMaxRent);
  }

  // Sort: properties with price data first (by price asc), then no-data properties alphabetically
  const sorted = filtered.sort((a,b) => {
    if (a.reviewPrice && b.reviewPrice) return a.reviewPrice - b.reviewPrice;
    if (a.reviewPrice) return -1;
    if (b.reviewPrice) return 1;
    return a.name.localeCompare(b.name);
  });
  const allHoods = [...new Set(SEED_PROPERTIES.map(p=>p.hood))];

  return `<div style="background:var(--black);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden">
    <div style="position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(232,74,39,0.12) 0%,transparent 60%);pointer-events:none"></div>
    <h2 style="font-size:32px;font-weight:900;color:white;letter-spacing:-1px;margin-bottom:8px;position:relative">Compare Properties</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:15px;position:relative">Side-by-side. Every property. Filter by what matters to you.</p>
  </div>
  <div class="container" style="padding-top:32px">

    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center;background:var(--light);padding:16px 20px;border-radius:12px;border:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:6px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">Beds</label>
        <select style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:white" onchange="go({cmpBeds:this.value})">
          <option value="all">All</option>
          <option value="0" ${S.cmpBeds==='0'?'selected':''}>Studio</option>
          <option value="1" ${S.cmpBeds==='1'?'selected':''}>1 bed</option>
          <option value="2" ${S.cmpBeds==='2'?'selected':''}>2 bed</option>
          <option value="3" ${S.cmpBeds==='3'?'selected':''}>3 bed</option>
          <option value="4" ${S.cmpBeds==='4'?'selected':''}>4 bed</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">Area</label>
        <select style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:white" onchange="go({cmpHood:this.value})">
          <option value="all">All</option>
          ${allHoods.map(h => `<option value="${esc(h)}" ${S.cmpHood===h?'selected':''}>${esc(h)}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">Max Rent</label>
        <select style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:white" onchange="go({cmpMaxRent:parseInt(this.value)||0})">
          <option value="0">No limit</option>
          <option value="600" ${S.cmpMaxRent===600?'selected':''}>Under $600</option>
          <option value="800" ${S.cmpMaxRent===800?'selected':''}>Under $800</option>
          <option value="1000" ${S.cmpMaxRent===1000?'selected':''}>Under $1,000</option>
          <option value="1200" ${S.cmpMaxRent===1200?'selected':''}>Under $1,200</option>
        </select>
      </div>
    </div>

    <div style="overflow-x:auto">
      <table class="compare-tbl">
        <thead><tr><th>Property</th><th>Landlord</th><th>Beds</th><th>Neighborhood</th><th>Price/mo</th><th>Rating</th><th>Value*</th></tr></thead>
        <tbody>
          ${sorted.map(p => {
            const l = SEED_LANDLORDS.find(x=>x.id===p.landlordId);
            const lStats = l ? getLandlordStats(l) : null;
            const rating = lStats && lStats.reviews > 0 ? lStats.rating : 0;
            const val = (rating > 0 && p.reviewPrice > 0) ? (rating/p.reviewPrice*1000).toFixed(1) : '—';
            return `<tr style="cursor:pointer" onclick="go({page:'detail',detail:${p.landlordId}})">
              <td><strong>${esc(p.name)}</strong></td>
              <td>${l?esc(l.name):''}</td>
              <td>${p.beds===0?'Studio':p.beds}</td>
              <td>${esc(p.hood)}</td>
              <td>${p.reviewPrice ? `<strong>$${p.reviewPrice}</strong><div style="font-size:10px;color:#9CA3AF">from ${p.reviewCount} review${p.reviewCount!==1?'s':''}</div>` : '<span style="color:#9CA3AF">—</span>'}</td>
              <td style="color:${rating > 0 ? scoreColor(rating) : '#6B7280'};font-weight:${rating > 0 ? '600' : '400'}">${rating > 0 ? rating.toFixed(1) : '—'}</td>
              <td style="color:#6B7280">${val}</td>
            </tr>`;
          }).join("")}

      </table>
    </div>
    ${sorted.length===0 ? '<p style="text-align:center;color:#7C7C7C;padding:32px">No properties match your filters. Try adjusting them.</p>' : ''}
    <p style="font-size:12px;color:#7C7C7C;margin-top:8px">*Value = Rating per $1,000/mo. Higher is better. Prices are averages from student reviews (per person/month). Properties with no reviews show no price.</p>
  </div>`;
}

// ===== LEASE SCANNER =====
const LEASE_FLAGS = [
  // HIGH SEVERITY — likely unenforceable or illegal under Illinois law
  {
    id: 'nonrefundable-deposit',
    patterns: [/non[\s-]?refundable\s+(security\s+)?deposit/i, /deposit.*(?:will\s+not|shall\s+not|cannot|won'?t)\s+be\s+returned/i],
    severity: 'high',
    title: 'Potentially Non-Refundable Security Deposit',
    explain: 'Illinois law requires landlords to return security deposits (minus documented deductions for actual damages) within 30 days for properties with 5+ units, or 45 days for smaller properties. A clause making a deposit entirely non-refundable may conflict with this requirement.',
    statute: '765 ILCS 710 — Security Deposit Return Act'
  },
  {
    id: 'waive-rights',
    patterns: [/waive.*(?:right|rights|remedies)/i, /tenant\s+(?:hereby\s+)?waives/i, /waiver\s+of\s+(?:tenant|all|any)\s+rights/i],
    severity: 'high',
    title: 'Waiver of Tenant Rights',
    explain: 'Under Illinois law, lease provisions that attempt to waive tenants\u2019 rights under the Security Deposit Return Act or local housing codes are generally void and unenforceable. You cannot be required to waive your statutory protections.',
    statute: '765 ILCS 710/6 — Provisions waiving tenant rights are void'
  },
  {
    id: 'no-repairs',
    patterns: [/tenant\s+(?:is\s+)?responsible\s+for\s+all\s+(?:repairs|maintenance)/i, /landlord.*(?:not|no)\s+(?:responsible|liable|obligat).*(?:repair|maintain|habitab)/i, /as[\s-]?is\s+condition/i, /accept.*premises.*(?:as[\s-]?is|current\s+condition)/i],
    severity: 'high',
    title: 'Potential Habitability Waiver',
    explain: 'Illinois landlords have an implied warranty of habitability — they must maintain the property in a livable condition regardless of what the lease says. Clauses that try to shift all repair responsibility to tenants or disclaim habitability obligations may be unenforceable.',
    statute: 'Jack Spring, Inc. v. Little (1972) — Implied Warranty of Habitability'
  },
  {
    id: 'lockout',
    patterns: [/lock[\s-]?out/i, /change.*locks.*(?:without|if|upon|for)/i, /deny\s+(?:access|entry).*(?:late|unpaid|overdue)/i, /remove\s+tenant.*property.*(?:unpaid|nonpayment)/i],
    severity: 'high',
    title: 'Potential Self-Help Eviction / Lockout',

function scanLease(text) {
  const results = [];
  const lowerText = text.toLowerCase();

  LEASE_FLAGS.forEach(flag => {
    for (const pattern of flag.patterns) {
      const match = text.match(pattern);
      if (match) {
        // Extract surrounding context (up to 100 chars each side)
        const idx = match.index;
        const start = Math.max(0, idx - 80);
        const end = Math.min(text.length, idx + match[0].length + 80);
        let snippet = text.slice(start, end).trim();
        if (start > 0) snippet = '...' + snippet;
        if (end < text.length) snippet = snippet + '...';

        results.push({
          ...flag,
          matchedText: snippet,
          matchedTerm: match[0]
        });
        break; // Only flag once per rule
      }
    }
  });

  return results;
}

// ===== SCANNER ANALYTICS =====
async function trackScannerEvent(eventType, metadata = {}) {
  try {
    await db.from('scanner_events').insert({
      event_type: eventType,
      metadata: metadata,
      created_at: new Date().toISOString(),
      user_agent: navigator.userAgent
    });
  } catch(e) {
    // Silent fail — analytics should never block UX
    console.log('Analytics event:', eventType, metadata);
  }
}

// ===== PDF TEXT EXTRACTION =====
async function extractPdfText(file) {
  if (!window.pdfjsLib) {
    toast('PDF reader is loading. Please try again in a moment.');
    return null;
  }
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  const totalPages = pdf.numPages;
  const progressEl = document.getElementById('scanner-progress');
  const progressFill = document.getElementById('scanner-progress-fill');
  const progressText = document.getElementById('scanner-progress-text');
  if (progressEl) { progressEl.style.display = 'block'; }

  for (let i = 1; i <= totalPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    fullText += pageText + '\n\n';
    if (progressFill) progressFill.style.width = ((i / totalPages) * 100) + '%';
    if (progressText) progressText.textContent = 'Reading page ' + i + ' of ' + totalPages + '...';
  }
  if (progressEl) { setTimeout(() => { progressEl.style.display = 'none'; }, 500); }
  return fullText.trim();
}

async function handlePdfUpload(file) {
  if (!file || file.type !== 'application/pdf') {
    toast('Please upload a PDF file.');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    toast('File too large. Maximum size is 20MB.');
    return;
  }
  pdfExtracting = true;
  const textarea = document.getElementById('lease-text');
  const uploadZone = document.getElementById('upload-zone');
  if (uploadZone) uploadZone.innerHTML = '<div class="upload-icon">&#9203;</div><div class="upload-text">Extracting text from <strong>' + esc(file.name) + '</strong>...</div>';

  try {
    const text = await extractPdfText(file);
    if (text && text.length > 50) {
      if (textarea) textarea.value = text;
      toast('PDF text extracted (' + text.length.toLocaleString() + ' characters). Ready to scan!');
      trackScannerEvent('pdf_upload', { filename: file.name, chars: text.length });
    } else {
      toast('Could not extract enough text from this PDF. It may be a scanned image. Try pasting the text manually.');
      trackScannerEvent('pdf_upload_fail', { filename: file.name, reason: 'insufficient_text' });
    }
  } catch(err) {
    toast('Error reading PDF: ' + err.message);
    trackScannerEvent('pdf_upload_fail', { filename: file.name, reason: err.message });
  }
  pdfExtracting = false;
  if (uploadZone) uploadZone.innerHTML = '<div class="upload-icon">&#128196;</div><div class="upload-text"><strong>Click to upload</strong> or drag & drop your lease PDF<br>PDF files up to 20MB</div>';
}

function setupUploadZone() {
  setTimeout(() => {
    const zone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('pdf-file-input');
    if (!zone || !fileInput) return;
    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handlePdfUpload(file);
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handlePdfUpload(file);
    });
  }, 50);
}

function showInterestPopup() {
  trackScannerEvent('interest_popup_shown');
  const overlay = document.createElement('div');
  overlay.className = 'interest-modal-overlay';
  overlay.id = 'interest-overlay';
  overlay.innerHTML = `
    <div class="interest-modal">
      <h3>&#128274; Want a Smarter Lease Scanner?</h3>
      <p>We're building an AI-powered version that gives you a detailed clause-by-clause analysis, specific to your landlord and Illinois law. Drop your email to get early access when it launches.</p>
      <input type="email" id="interest-email" placeholder="your@illinois.edu" />

        <button class="btn-secondary" onclick="closeInterestPopup()">No thanks</button>
        <button class="btn-primary" onclick="submitInterest()">Notify Me</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeInterestPopup(); });

function closeInterestPopup() {
  const overlay = document.getElementById('interest-overlay');
  if (overlay) overlay.remove();
  trackScannerEvent('interest_popup_dismissed');
}

async function submitInterest() {
  const email = document.getElementById('interest-email')?.value?.trim();
  if (!email || !email.includes('@')) {
    toast('Please enter a valid email address.');
    return;
  }
  try {
    await db.from('scanner_interest').insert({
      email: email,
      created_at: new Date().toISOString(),
      source: 'scanner_popup'
    });
    trackScannerEvent('interest_submitted', { email_domain: email.split('@')[1] });
    toast('You\'re on the list! We\'ll email you when the AI scanner launches.');
    closeInterestPopup();
  } catch(e) {
    // Fallback — log even if table doesn't exist yet
    trackScannerEvent('interest_submitted_fallback', { email: email });
    toast('Thanks! We\'ll be in touch.');
    closeInterestPopup();
  }
}

function renderScanResults() {
  if (!scanResults) return '';
  const flags = scanResults;
  const high = flags.filter(f => f.severity === 'high').length;
  const medium = flags.filter(f => f.severity === 'medium').length;
  const low = flags.filter(f => f.severity === 'low').length;

  if (flags.length === 0) {
    return `<div class="scan-clean">
      <h3>&#9989; No Common Red Flags Detected</h3>
      <p>We didn't find any commonly flagged clauses, but this doesn't mean your lease is perfect. We recommend having the <a href="https://studentlegal.illinois.edu/" target="_blank" style="color:#065F46;text-decoration:underline">UIUC Student Legal Service</a> review it — it's free.</p>
    </div>`;
  }

  return `
    <div class="scan-summary">
      <div class="scan-stat red"><div class="scan-stat-num">${high}</div><div class="scan-stat-label">Review Carefully</div></div>
      <div class="scan-stat yellow"><div class="scan-stat-num">${medium}</div><div class="scan-stat-label">Worth Checking</div></div>
      <div class="scan-stat green"><div class="scan-stat-num">${low}</div><div class="scan-stat-label">Good to Know</div></div>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px">Found ${flags.length} clause${flags.length!==1?'s':''} worth reviewing. Items are sorted by importance — red items first.</p>
    ${flags.sort((a,b) => {
      const sev = {high:0,medium:1,low:2};
      return sev[a.severity] - sev[b.severity];
    }).map(f => `
      <div class="flag-card severity-${f.severity}">
        <div class="flag-severity">${f.severity === 'high' ? '&#9888;&#65039; Review Carefully' : f.severity === 'medium' ? '&#9888; Worth Checking' : '&#8505;&#65039; Good to Know'}</div>
        <div class="flag-title">${esc(f.title)}</div>
        <div class="flag-match">"...${esc(f.matchedTerm)}..."</div>
        <div class="flag-explain">${f.explain}</div>
        <div class="flag-statute">&#128218; ${esc(f.statute)}</div>
      </div>
    `).join('')}
    <div class="scanner-disclaimer" style="margin-top:24px">
      <strong>Next step:</strong> If any red or yellow items concern you, bring your lease to the <a href="https://studentlegal.illinois.edu/" target="_blank" style="color:#C2410C;text-decoration:underline;font-weight:600">UIUC Student Legal Service</a> (Turner Student Services Building, Room 324) for a free review. They can tell you whether specific clauses are enforceable and help you negotiate changes before you sign.
    </div>
  `;
}

function runScan() {
  const text = document.getElementById('lease-text')?.value?.trim();
  if (!text || text.length < 50) {
    toast('Please paste your lease text (at least a few paragraphs).');
    return;
  }
  scannerClicks++;
  scanResults = scanLease(text);
  // Track scan event
  trackScannerEvent('scan_executed', {
    text_length: text.length,
    flags_found: scanResults.length,
    high_flags: scanResults.filter(f => f.severity === 'high').length,
    medium_flags: scanResults.filter(f => f.severity === 'medium').length,
    low_flags: scanResults.filter(f => f.severity === 'low').length,
    scan_number: scannerClicks
  });
  render();
  // Scroll to results
  setTimeout(() => {
    const el = document.getElementById('scan-results');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ===== USER-SUBMITTED LANDLORDS & PROPERTIES =====
let userLandlords = []; // loaded from Supabase on init
let userProperties = []; // loaded from Supabase on init

async function loadUserSubmissions() {
  try {
    const { data: ld } = await db.from('user_landlords').select('*').order('name');
    if (ld) userLandlords = ld;
    const { data: pp } = await db.from('user_properties').select('*').order('address');
    if (pp) userProperties = pp;
  } catch(e) { /* tables may not exist yet — silent fail */ }
}

function buildPropertyDropdown(landlordId) {
  // Combine seed + user-submitted properties, filtered by landlord if one is selected
  let props = [];
  if (landlordId && typeof landlordId === 'number') {
    props = SEED_PROPERTIES.filter(p => p.landlordId === landlordId).map(p => ({ address: p.name, hood: p.hood }));
    // Also add user-submitted properties for this landlord
    const match = SEED_LANDLORDS.find(x => x.id === landlordId);
    if (match) {
      const userProps = userProperties.filter(p => p.landlord_name && p.landlord_name.toLowerCase() === match.name.toLowerCase());
      userProps.forEach(p => props.push({ address: p.address, hood: p.hood_name || '' }));
    }
  } else if (landlordId && typeof landlordId === 'string' && landlordId.startsWith('user_')) {
    // User-submitted landlord
    const ul = userLandlords.find(x => 'user_' + x.id === landlordId);
    if (ul) {
      const userProps = userProperties.filter(p => p.landlord_name && p.landlord_name.toLowerCase() === ul.name.toLowerCase());
      userProps.forEach(p => props.push({ address: p.address, hood: p.hood_name || '' }));
    }
  } else {
    // No landlord selected — prompt user to pick one first
    return `<select id="rev-property-select" disabled>
      <option value="">Pick a landlord first...</option>
    </select>`;
  }

  const showLandlordName = !landlordId;
  const landlordObj = typeof landlordId === 'number' ? SEED_LANDLORDS.find(x => x.id === landlordId) : null;
  const isSkipAddress = landlordObj && landlordObj.skipAddress;
  return `<select id="rev-property-select" onchange="toggleCustomAddress(this)">
    <option value="">${isSkipAddress ? 'Select your building...' : 'Select a property...'}</option>
    ${props.map(p => `<option value="${esc(p.address)}">${esc(p.address)}${showLandlordName && p.landlordName ? ' (' + esc(p.landlordName) + ')' : ''}</option>`).join("")}
    ${isSkipAddress ? '' : '<option value="__custom__">Other — type my address</option>'}
  </select>`;
}

// ===== ACTIONS =====
function onLandlordChange(sel) {
  const customInput = document.getElementById('rev-landlord-custom');
  const propContainer = document.getElementById('rev-property-container');
  if (sel.value === '__other__') {
    if (customInput) customInput.style.display = 'block';
    // Show all properties since we don't know the landlord
    if (propContainer) propContainer.innerHTML = buildPropertyDropdown(null);
  } else {
    if (customInput) customInput.style.display = 'none';
    // Filter properties to selected landlord
    const lid = sel.value.startsWith('user_') ? sel.value : parseInt(sel.value);
    if (propContainer) propContainer.innerHTML = buildPropertyDropdown(lid || null);
  }
  // Reset custom address field
  const customAddr = document.getElementById('rev-property-custom');
  if (customAddr) customAddr.style.display = 'none';
  const hoodSelect = document.getElementById('rev-hood-select');
  if (hoodSelect) hoodSelect.style.display = 'none';
}

function toggleCustomAddress(sel) {
  const custom = document.getElementById('rev-property-custom');
  const hoodSelect = document.getElementById('rev-hood-select');
  if (custom) custom.style.display = sel.value === '__custom__' ? 'block' : 'none';
  if (hoodSelect) hoodSelect.style.display = sel.value === '__custom__' ? 'block' : 'none';
}

async function submitReview(landlordIdFromDetail) {
  // Handle landlord selection — could be seed, user-submitted, or custom new
  let landlordId = landlordIdFromDetail;
  let landlordName = '';
  let isCustomLandlord = false;

  if (!landlordId) {
    const landlordSelect = document.getElementById('rev-landlord');
    const landlordVal = landlordSelect?.value || '';
    const landlordCustom = document.getElementById('rev-landlord-custom')?.value?.trim() || '';

    if (landlordVal === '__other__') {
      if (!landlordCustom) { toast('Please type your landlord\'s name.'); return; }
      isCustomLandlord = true;
      landlordName = landlordCustom;
      // We'll save this new landlord to user_landlords after the review
      landlordId = -1; // placeholder
    } else if (landlordVal.startsWith('user_')) {
      const ul = userLandlords.find(x => 'user_' + x.id === landlordVal);
      landlordId = parseInt(landlordVal.replace('user_', ''));
      landlordName = ul ? ul.name : '';
    } else {
      landlordId = parseInt(landlordVal);
      const match = SEED_LANDLORDS.find(x => x.id === landlordId);
      landlordName = match ? match.name : '';
    }
  } else {
    const match = SEED_LANDLORDS.find(x => x.id === landlordId);
    landlordName = match ? match.name : '';
  }

  if (!landlordId && !isCustomLandlord) { toast('Please select a landlord.'); return; }
  if (S.stars === 0) { toast('Please select a star rating (1-5 stars).'); return; }
  if (S.wouldRentChoice === null) { toast('Please answer: would you rent from them again?'); return; }
  if (!document.getElementById('rev-certify')?.checked) { toast('Please certify that you are a real tenant, not a landlord or property manager.'); return; }

  const propSelect = document.getElementById('rev-property-select')?.value || '';
  const propCustom = document.getElementById('rev-property-custom')?.value?.trim() || '';
  if (!propSelect) { toast('Please select a property address.'); return; }
  if (propSelect === '__custom__' && !propCustom) { toast('Please type your property address.'); return; }

  const text = document.getElementById('rev-text')?.value?.trim();
  if (!text || text.length < 20) { toast('Please write at least 20 characters about your experience.'); return; }
  if (text.length > 5000) { toast('Review text is too long (max 5,000 characters).'); return; }

  const rentInput = document.getElementById('rev-rent')?.value;
  const monthlyRentVal = parseInt(rentInput) || 0;
  if (rentInput && monthlyRentVal > 0 && (monthlyRentVal < 100 || monthlyRentVal > 5000)) { toast('Monthly rent should be between $100 and $5,000.'); return; }

  const isCustomProperty = propSelect === '__custom__' && propCustom;
  const property = propSelect === '__custom__' ? (propCustom || 'Not specified') : (propSelect || 'Not specified');
  const email = document.getElementById('rev-email')?.value?.trim() || '';
  const leaseStart = document.getElementById('rev-lease-start')?.value || '';
  const leaseEnd = document.getElementById('rev-lease-end')?.value || '';
  const leasePeriod = (leaseStart && leaseEnd) ? leaseStart + ' – ' + leaseEnd : '';

  // Collect rent + neighborhood ratings
  const monthlyRent = monthlyRentVal;
  const hoodSafety = parseInt(document.getElementById('rev-hood-safety')?.value) || 0;
  const hoodWalk = parseInt(document.getElementById('rev-hood-walk')?.value) || 0;
  const hoodQuiet = parseInt(document.getElementById('rev-hood-quiet')?.value) || 0;
  const hoodNightlife = parseInt(document.getElementById('rev-hood-nightlife')?.value) || 0;

  // Determine which neighborhood this property is in
  const matchedProp = SEED_PROPERTIES.find(p => p.name === property);
  const customHood = document.getElementById('rev-hood-select')?.value || '';
  const hoodName = matchedProp ? matchedProp.hood : customHood;

  // Collect selected tags
  const posTags = [...document.querySelectorAll('#pos-tags .sel-pos')].map(el => el.dataset.tag);
  const negTags = [...document.querySelectorAll('#neg-tags .sel-neg')].map(el => el.dataset.tag);

  // Include lease period in review text if provided
  const fullText = leasePeriod ? `[Lease: ${leasePeriod}] ${text}` : text;

  // Save new landlord to Supabase if custom
  if (isCustomLandlord && landlordName) {
    try {
      const { data } = await db.from('user_landlords').insert({ name: landlordName }).select();
      if (data && data[0]) {
        landlordId = data[0].id;
        userLandlords.push(data[0]);
      }
    } catch(e) { /* continue with review even if landlord save fails */ }
  }

  // Save new property address to Supabase if custom
  if (isCustomProperty && propCustom) {
    try {
      await db.from('user_properties').insert({
        address: propCustom,
        landlord_name: landlordName || (SEED_LANDLORDS.find(x=>x.id===landlordId)||{}).name || '',
        hood_name: hoodName,
        submitted_at: new Date().toISOString()
      });
      userProperties.push({ address: propCustom, landlord_name: landlordName, hood_name: hoodName });
    } catch(e) { /* continue with review even if property save fails */ }
  }

  const review = {
    landlordId: landlordId,
    property: property,
    author: email.endsWith('@illinois.edu') ? 'Verified Illini' : 'Anonymous Student',
    rating: S.stars,
    wouldRent: S.wouldRentChoice === true,
    text: fullText,
    pos: posTags,
    neg: negTags,
    monthlyRent: monthlyRent,
    hoodName: hoodName,
    hoodSafety: hoodSafety,
    hoodWalkability: hoodWalk,
    hoodQuiet: hoodQuiet,
    hoodNightlife: hoodNightlife,
    landlordName: landlordName || '',
  };

  // Disable button while saving
  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  const success = await saveReviewToDb(review);
  if (success) {
    go({modal:false, stars:0, wouldRentChoice:null});
    toast('Review submitted! Everyone can see it now.');
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Submit My Review'; }
    toast('Something went wrong. Try again.');
  }
}

async function markHelpful(reviewId, btn, currentCount) {
  const helped = loadHelpful();
  if (helped[reviewId]) return;
  saveHelpful(reviewId);
  btn.style.borderColor = '#16A34A';
  btn.style.color = '#16A34A';
  btn.innerHTML = `&#128077; Helpful (${currentCount + 1})`;
  await incrementHelpful(reviewId);
}

function copyShareLink() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('Link copied! Share it with your friends.'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Link copied! Share it with your friends.');
  }
}

// ===== MAIN RENDER =====
function render() {
  // Save search input focus state before re-render
  const searchEl = document.querySelector('.search-wrap input');
  const hadSearchFocus = searchEl && document.activeElement === searchEl;
  const cursorPos = hadSearchFocus ? searchEl.selectionStart : 0;

  let html = Nav();
  if (S.page === 'home' && !S.detail) html += ShareBanner() + Hero() + ResultsList();
  else if (S.page === 'detail' || S.detail) html += DetailPage();
  else if (S.page === 'hoods') html += Hoods();
  else if (S.page === 'compare') html += Compare();
  else if (S.page === 'scanner') html += LeaseScanner();
  html += Modal() + Footer();
  document.getElementById('app').innerHTML = html;
  if (!S.detail && !S.modal && !hadSearchFocus) window.scrollTo(0, 0);

  // Restore search input focus after re-render
  if (hadSearchFocus) {
    const newSearch = document.querySelector('.search-wrap input');
    if (newSearch) { newSearch.focus(); newSearch.setSelectionRange(cursorPos, cursorPos); }
  }
}

// Handle browser back/forward
window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (hash.startsWith('landlord-')) {
    const id = parseInt(hash.split('-')[1]);
    if (id) go({page:'detail', detail:id});
  } else if (hash === 'neighborhoods') go({page:'hoods', detail:null});
  else if (hash === 'compare') go({page:'compare', detail:null});
  else if (hash === 'scanner') go({page:'scanner', detail:null});
  else go({page:'home', detail:null});
});

// Update hash on navigation
const _origGo = go;

render();
loadUserSubmissions(); // Load user-submitted landlords & properties from Supabase
</script>
